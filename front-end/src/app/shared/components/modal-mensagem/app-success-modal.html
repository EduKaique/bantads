@if (mostrar) {
  <div class="modal-overlay">
    <div class="modal-container">
      <div class="modal-content">
        <div class="success-icon">
          <i>✓</i>
        </div>
        <h2 class="modal-title">{{ titulo }}</h2>
        <p class="modal-subtitle">{{ subtitulo }}</p>
        @if (mostrarDataHora) {
          <div class="modal-datetime">
            {{ dataHoraFormatada }}
          </div>
        }
        <!-- Exibe dados adicionais apenas se foram fornecidos -->
        @if (dadosAdicionais) {
          <div class="modal-additional">
            <p>{{ dadosAdicionais }}</p>
          </div>
        }
        <button class="modal-button" (click)="fecharModal()">
          {{ textoBotao }}
        </button>
      </div>
    </div>
  </div>
}

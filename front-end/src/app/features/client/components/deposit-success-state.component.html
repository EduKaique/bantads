<section class="deposit-success-card" aria-live="polite">
  <div class="deposit-success-card__indicator" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M5 12.5 9.2 16.7 19 6.9" />
    </svg>
  </div>

  <div class="deposit-success-card__content">
    <h1 class="deposit-success-card__title">
      Seu depósito foi realizado com sucesso!
    </h1>

    <div class="deposit-success-card__details">
      <p>Data: {{ formattedDate }}</p>
      <p>Hora: {{ formattedTime }}</p>
    </div>
  </div>
</section>

<div class="modal-overlay">
  <div class="modal-card">

    <div class="modal-header">
      <h2 class="modal-titulo">Confirmar o valor do Saque</h2>
      <button class="btn-fechar">✕</button>
    </div>

    <div class="modal-body">
      <span class="modal-pergunta">
        Tem certeza que deseja prosseguir com esse valor?
      </span>
      <div class="modal-valor">{{ valorFormatado }}</div>
    </div>

    <div class="modal-acoes">
      <button class="btn-cancelar" (click)="onCancelar()">Cancelar</button>
      <button class="btn-confirmar" (click)="onConfirmar()">Confirmar</button>
    </div>

  </div>
</div>

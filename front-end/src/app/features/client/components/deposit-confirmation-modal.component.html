@if (visible) {
  <div
    class="confirmation-backdrop"
    role="dialog"
    aria-modal="true"
    aria-labelledby="deposit-confirmation-title"
    (click)="onCancel()"
  >
    <div class="confirmation-modal" (click)="$event.stopPropagation()">
      <header class="confirmation-modal__header">
        <div class="confirmation-modal__heading">
          <h2 id="deposit-confirmation-title" class="confirmation-modal__title heading_5">
            {{ title }}
          </h2>
          <p class="confirmation-modal__description body_medium">
            {{ description }}
          </p>
        </div>

        <button
          type="button"
          class="confirmation-modal__close"
          aria-label="Fechar confirmação"
          [disabled]="isBusy"
          (click)="onCancel()"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18.3 5.71L12 12l6.3 6.29-1.41 1.41L10.59 13.41 4.29 19.7 2.88 18.29 9.17 12 2.88 5.71 4.29 4.3l6.3 6.29 6.29-6.3z" />
          </svg>
        </button>
      </header>

      <div class="confirmation-modal__content">
        <p class="confirmation-modal__question label_small">
          {{ question }}
        </p>
        <app-input-primary
          class="confirmation-modal__amount-field"
          [label]="amountLabel"
          [valorExibido]="formattedAmount"
          [readonly]="true"
          inputName="confirmation-amount"
          type="text"
        ></app-input-primary>
        @if (detailLines.length) {
          <div class="confirmation-modal__details body_medium">
            @for (detailLine of detailLines; track detailLine) {
              <p>{{ detailLine }}</p>
            }
          </div>
        }
      </div>

      <div class="confirmation-modal__actions">
        <button
          type="button"
          class="button-secondary confirmation-modal__action"
          [disabled]="isBusy"
          (click)="onCancel()"
        >
          {{ cancelLabel }}
        </button>

        <button
          type="button"
          class="button-primary confirmation-modal__action"
          [disabled]="isBusy"
          (click)="onConfirm()"
        >
          {{ confirmLabel }}
        </button>
      </div>
    </div>
  </div>
}

@if (visible) {
  <div class="confirmation-backdrop" role="dialog" aria-modal="true" aria-labelledby="deposit-confirmation-title">
    <div class="confirmation-modal">
      <header class="confirmation-modal__header">
        <h2 id="deposit-confirmation-title" class="confirmation-modal__title">
          Confirmar o depósito
        </h2>

        <button
          type="button"
          class="confirmation-modal__close"
          aria-label="Fechar confirmação"
          (click)="onCancel()"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M18.3 5.71L12 12l6.3 6.29-1.41 1.41L10.59 13.41 4.29 19.7 2.88 18.29 9.17 12 2.88 5.71 4.29 4.3l6.3 6.29 6.29-6.3z" />
          </svg>
        </button>
      </header>

      <div class="confirmation-modal__content">
        <p class="confirmation-modal__question">Tem certeza que deseja depositar</p>
        <div class="confirmation-modal__amount">{{ formattedAmount }}</div>
      </div>

      <div class="confirmation-modal__actions">
        <button
          type="button"
          class="confirmation-modal__action confirmation-modal__action--cancel"
          [disabled]="isBusy"
          (click)="onCancel()"
        >
          Cancelar
        </button>

        <button
          type="button"
          class="confirmation-modal__action confirmation-modal__action--confirm"
          [disabled]="isBusy"
          (click)="onConfirm()"
        >
          Confirmar
        </button>
      </div>
    </div>
  </div>
}

<section class="transfer-screen">
  <article class="transfer-card">
    <header class="transfer-card__header">
      <h1 class="transfer-card__title">Transferência</h1>
      <p class="transfer-card__description">
        Preencha as informações para realizar a transferência.
      </p>
    </header>

    <form class="transfer-form" [formGroup]="transferForm" (ngSubmit)="onSubmit()">
      <div class="transfer-form__search">
        <app-input-primary
          label="*Número da Conta de Destino"
          inputName="account-number"
          type="text"
          formControlName="accountNumber"
          placeholder="Ex: 1291"
          [errorMessage]="accountNumberErrorMessage"
          class="transfer-field transfer-field--grow"
        ></app-input-primary>

        <button
          type="button"
          class="button-secondary transfer-form__search-button label_large"
          (click)="searchAccount()"
          [disabled]="buscandoConta"
        >
          @if (!buscandoConta) {
            <mat-icon>search</mat-icon>
          }
          {{ buscandoConta ? 'Buscando...' : 'Pesquisar' }}
        </button>
      </div>

      <div class="transfer-form__fields">
        <app-input-primary
          label="Nome"
          inputName="destination-name"
          type="text"
          [valorExibido]="nomeDestino"
          [readonly]="true"
          class="transfer-field"
        ></app-input-primary>

        <app-input-primary
          label="CPF"
          inputName="destination-cpf"
          type="text"
          [valorExibido]="cpfDestino"
          [readonly]="true"
          class="transfer-field"
        ></app-input-primary>

        <app-input-primary
          label="*Valor"
          inputName="transfer-amount"
          type="text"
          formControlName="amount"
          mask="separator.2"
          prefix="R$ "
          thousandSeparator="."
          decimalMarker=","
          placeholder="R$ 0,00"
          [errorMessage]="amountErrorMessage"
          class="transfer-field"
        ></app-input-primary>

        <app-input-primary
          label="Saldo Disponível"
          inputName="available-balance"
          type="text"
          [valorExibido]="saldoDisponivelFormatado"
          [readonly]="true"
          class="transfer-field"
        ></app-input-primary>
      </div>

      <p class="transfer-form__helper" [class.transfer-form__helper--error]="helperIsError">
        {{ helperMessage }}
      </p>

      <div class="transfer-form__actions">
        <button
          type="submit"
          class="button-primary transfer-form__submit label_large"
          [disabled]="isModalOpen || buscandoConta"
        >
          Enviar
        </button>
      </div>
    </form>
  </article>

  <app-deposit-confirmation-modal
    [visible]="isModalOpen"
    [formattedAmount]="valorTransferenciaFormatado"
    [title]="'Confirmar transferência'"
    [description]="'Confira os dados abaixo antes de concluir a operação.'"
    [question]="'Tem certeza que deseja enviar'"
    [amountLabel]="'Valor da transferência'"
    [detailLines]="nomeDestino ? ['Para ' + nomeDestino] : []"
    [confirmLabel]="'Confirmar'"
    [cancelLabel]="'Cancelar'"
    (cancelled)="closeModal()"
    (confirmed)="confirmTransfer()"
  />

  @if (showToast) {
    <div class="toast-container">
      <div class="toast-content body_medium">
        <span>{{ toastMessage }}</span>
      </div>
    </div>
  }
</section>

<app-success-modal
  [(mostrar)]="exibirModalSucesso"
  titulo="Transferência concluída!"
  [subtitulo]="'Valor enviado: ' + valorEnviado"
  [mostrarDataHora]="true"
  [dataHoraReferencia]="successfulTransferTimestamp"
  [exibirBotaoSecundario]="true"
  textoBotaoSecundario="Nova transferência"
  textoBotao="Voltar ao Início"
  rotaDestino="/cliente/home"
  (botaoSecundarioClick)="novaTransferencia()"
></app-success-modal>

<div class="bg-main">
  <div class="card-transfer">
    <div class="header-content">
      <h1 class="text-title heading_2">Transferência</h1>
      <p class="text-description body_large">
        Preencha as informações para realizar a transferência.
      </p>
    </div>

    <form [formGroup]="transferForm" (ngSubmit)="onSubmit()" class="form-grid-layout">
      <div class="form-row account-search-group full-width">
        <div class="form-group flex-grow">
          <label class="form-label label_large">*Número da Conta de Destino</label>
          <input
            type="text"
            class="form-control body_medium"
            formControlName="accountNumber"
            placeholder="Ex: 1291"
            maxlength="4"
          />
        </div>

        <button
          type="button"
          class="btn-search label_large"
          (click)="searchAccount()"
          [disabled]="buscandoConta"
        >
          @if (!buscandoConta) {
            <mat-icon>search</mat-icon>
          }
          <span>{{ buscandoConta ? 'Buscando...' : 'Pesquisar' }}</span>
        </button>
      </div>

      <div class="form-row full-width form-group">
        <label class="form-label label_large">Nome</label>
        <input type="text" class="form-control body_medium disabled-field" formControlName="name" readonly />
      </div>

      <div class="form-row full-width form-group">
        <label class="form-label label_large">CPF</label>
        <input
          type="text"
          class="form-control body_medium disabled-field"
          formControlName="cpf"
          placeholder="___.___.___-__"
          readonly
        />
      </div>

      <div class="form-row split-group full-width">
        <div class="form-group half-width">
          <label class="form-label label_large">*Valor</label>
          <input
            type="text"
            class="form-control body_medium"
            formControlName="amount"
            placeholder="R$ 0,00"
            (input)="onAmountInput($event)"
          />
        </div>

        <div class="form-group half-width">
          <label class="form-label label_large">Saldo Disponível</label>
          <input type="text" class="form-control body_medium disabled-field" formControlName="balance" readonly />
        </div>
      </div>

      <div class="form-row full-width footer-actions">
        <p class="footer-note body_medium">* Campo de preenchimento obrigatório</p>
        <button
          type="submit"
          class="button-primary btn-submit label_large"
          [disabled]="!contaEncontrada || buscandoConta"
        >
          Enviar
        </button>
      </div>
    </form>
  </div>

  <app-deposit-confirmation-modal
    [visible]="isModalOpen"
    [formattedAmount]="transferForm.get('amount')?.value || ''"
    [title]="'Confirmar transferência'"
    [description]="'Confira os dados abaixo antes de concluir a operação.'"
    [question]="'Tem certeza que deseja enviar'"
    [detailLines]="['Para ' + nomeDestino]"
    [confirmLabel]="'Confirmar'"
    [cancelLabel]="'Cancelar'"
    (cancelled)="closeModal()"
    (confirmed)="confirmTransfer()"
  />

  @if (showToast) {
    <div class="toast-container">
      <div class="toast-content body_medium">
        <span>{{ toastMessage }}</span>
      </div>
    </div>
  }
</div>

<app-success-modal
  [(mostrar)]="exibirModalSucesso"
  titulo="Transferência concluída!"
  [subtitulo]="'Valor enviado: ' + valorEnviado"
  [mostrarDataHora]="true"
  [exibirBotaoSecundario]="true"
  textoBotaoSecundario="Nova transferência"
  textoBotao="Voltar ao Início"
  rotaDestino="/cliente/home">
</app-success-modal>

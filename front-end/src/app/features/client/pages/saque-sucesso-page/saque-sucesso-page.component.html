<main class="sucesso-wrapper">
  <app-success-modal
    [(mostrar)]="mostrarModal"
    titulo="Saque concluído!"
    [subtitulo]="'Valor sacado: ' + valorFormatado"
    [mostrarDataHora]="true"
    [dataHoraReferencia]="dataHora"
    [exibirBotaoSecundario]="true"
    textoBotaoSecundario="Novo saque"
    textoBotao="Voltar ao Início"
    rotaDestino="/cliente/home"
    (botaoSecundarioClick)="novoSaque()"
  />
</main>

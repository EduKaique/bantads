<main class="sucesso-wrapper">
  <section class="sucesso-card">

    <div class="sucesso-icone">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52"
           fill="none" width="52" height="52">
        <polyline points="8,28 20,40 44,14"
                  stroke="#EDFCF3" stroke-width="5.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="sucesso-conteudo">
      <h1 class="sucesso-titulo">Seu saque foi realizado com sucesso!</h1>

      <div class="sucesso-valor">{{ valorFormatado }}</div>

      <p class="sucesso-detalhe">
        Data: {{ dataFormatada }}<br />
        Hora: {{ horaFormatada }}
      </p>
    </div>

    <div class="sucesso-acoes">
      <button class="btn-novo-saque" (click)="novoSaque()">
        Novo Saque
      </button>
      <button class="btn-dashboard" (click)="voltarDashboard()">
        Voltar ao Início
      </button>
    </div>

  </section>
</main>

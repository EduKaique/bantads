<main>
    <section class="update-container">

        <div class="update-header">
            <div class="update-text">
                <h1 class="heading_3">Informações de perfil</h1>
                <p class="body_medium">Visualize e edite seus dados.</p>
            </div>

            <div class="row-button">
                <button type="button"
                    [class]="isEditMode ? 'button-secondary label_large' : 'button-primary label_large'"
                    (click)="toggleEdit()">

                    {{ isEditMode ? 'Cancelar' : 'Editar' }}
                </button>

                <button type="button" class="button-primary label_large" [disabled]="!isEditMode"
                    (click)="isEditMode && onSubmit()">
                    Atualizar
                </button>
            </div>
        </div>

        <!--Informações pessoais-->
        <form class="form-content" [formGroup]="firstFormGroup">
            <h3>Informações Pessoais</h3>

            <div class="grid-2">
                <app-input-primary label="Nome" formControlName="nameUser" [readonly]="!isEditMode">
                </app-input-primary>

                <app-input-primary label="CPF" formControlName="cpfUser" mask="000.000.000-00" [readonly]="true">
                </app-input-primary>
            </div>

            <div class="grid-2">
                <app-input-primary label="Email" formControlName="email" [readonly]="!isEditMode">
                </app-input-primary>

                <app-input-primary label="Telefone" formControlName="phoneUser" mask="(00) 00000-0000"
                    [readonly]="!isEditMode">
                </app-input-primary>
            </div>

            <div class="grid-2">
                <app-input-primary label="Salário" formControlName="salary" mask="separator.2" thousandSeparator="."
                    decimalMarker="," [readonly]="!isEditMode">
                </app-input-primary>

                <app-input-primary label="Limite" formControlName="limit" [readonly]="true">
                </app-input-primary>
            </div>
        </form>

        <!--Endereço-->
        <form class="form-content" [formGroup]="secondFormGroup">
            <h3>Endereço</h3>

            <div class="cep-row">
                <app-input-primary formControlName="cep" label="CEP" mask="00000-000" [readonly]="!isEditMode">
                </app-input-primary>

                <span class="button-search-cep label_large" [class.disabled]="!isEditMode || !isCepValid"
                    (click)="(isEditMode && isCepValid) && searchCep()">

                    <mat-icon fontIcon="search"></mat-icon>
                    Pesquisar
                </span>
            </div>

            <div class="grid-3">
                <app-input-primary label="Rua" formControlName="address" [readonly]="!isEditMode">
                </app-input-primary>

                <app-input-primary label="Bairro" formControlName="neighborhood" [readonly]="!isEditMode">
                </app-input-primary>

                <app-input-primary label="Número" formControlName="number" [readonly]="!isEditMode">
                </app-input-primary>
            </div>

            <div class="grid-3">
                <app-input-primary label="Cidade" formControlName="city" [readonly]="!isEditMode">
                </app-input-primary>

                <app-input-primary label="Complemento" formControlName="complement" [readonly]="!isEditMode">
                </app-input-primary>

                <app-input-primary label="Estado" formControlName="state" [readonly]="!isEditMode">
                </app-input-primary>
            </div>

        </form>

    </section>

    <app-success-modal 
      [(mostrar)]="showModal" 
      titulo="Sua conta foi atualizada com sucesso!" 
      [dadosAdicionais]="[
        'Saldo: ' + balance,
        'Gerente: ' + managerName
      ]"
      textoBotao="Voltar" 
      [rotaDestino]="'cliente/alteracao-perfil/' + cpf">
    </app-success-modal>
</main>

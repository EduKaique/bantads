<section class="deposit-screen">
  @if (account$ | async; as account) {
    <article class="deposit-card">
      <header class="deposit-card__header">
        <h1 class="deposit-card__title">Depósito</h1>
        <p class="deposit-card__description">
          Preencha o valor que deseja depositar em sua conta.
        </p>
      </header>

      <form class="deposit-form" [formGroup]="depositForm" (ngSubmit)="openConfirmation()">
        <div class="deposit-form__fields">
          <app-input-primary
            label="*Valor"
            inputName="amount"
            type="text"
            formControlName="amount"
            mask="separator.2"
            prefix="R$ "
            thousandSeparator="."
            decimalMarker=","
            placeholder="R$ 0,00"
            [errorMessage]="amountErrorMessage"
            class="deposit-field"
          ></app-input-primary>

          <app-input-primary
            label="Saldo Disponível"
            inputName="available-balance"
            type="text"
            [valorExibido]="formatCurrency(account.availableBalance)"
            [readonly]="true"
            class="deposit-field"
          ></app-input-primary>
        </div>

        <p class="deposit-form__helper" [class.deposit-form__helper--error]="helperIsError">
          {{ helperMessage }}
        </p>

        <div class="deposit-form__actions">
          <button
            type="submit"
            class="button-primary deposit-form__submit label_large"
            [disabled]="isSubmitting"
          >
            Enviar
          </button>
        </div>
      </form>
    </article>
  }

  <app-deposit-confirmation-modal
    [visible]="isConfirmationVisible"
    [formattedAmount]="pendingAmountLabel"
    [isBusy]="isSubmitting"
    (cancelled)="closeConfirmation()"
    (confirmed)="confirmDeposit()"
  />

  <app-success-modal
    [(mostrar)]="exibirModalSucesso"
    titulo="Depósito concluído!"
    [subtitulo]="'Valor depositado: ' + successfulDepositAmountLabel"
    [mostrarDataHora]="true"
    [dataHoraReferencia]="successfulDepositTimestamp"
    [exibirBotaoSecundario]="true"
    textoBotaoSecundario="Novo depósito"
    textoBotao="Voltar ao Início"
    rotaDestino="/cliente/home"
    (botaoSecundarioClick)="novoDeposito()"
  />
</section>

<section class="withdraw-screen">
  <article class="withdraw-card">
    <header class="withdraw-card__header">
      <h1 class="withdraw-card__title">Saque</h1>
      <p class="withdraw-card__description">
        Preencha o valor que deseja sacar da sua conta.
      </p>
    </header>

    <form class="withdraw-form" [formGroup]="saqueForm" (ngSubmit)="onEnviar()">
      <div class="withdraw-form__fields">
        <app-input-primary
          label="*Valor"
          inputName="withdraw-amount"
          type="text"
          formControlName="valor"
          mask="separator.2"
          prefix="R$ "
          thousandSeparator="."
          decimalMarker=","
          placeholder="R$ 0,00"
          [errorMessage]="amountErrorMessage"
          class="withdraw-field"
        ></app-input-primary>

        <app-input-primary
          label="Saldo Disponível"
          inputName="available-balance"
          type="text"
          [valorExibido]="formatCurrency(saldoDisponivel)"
          [readonly]="true"
          class="withdraw-field"
        ></app-input-primary>
      </div>

      <p class="withdraw-form__helper" [class.withdraw-form__helper--error]="helperIsError">
        {{ helperMessage }}
      </p>

      <div class="withdraw-form__actions">
        <button
          type="submit"
          class="button-primary withdraw-form__submit label_large"
          [disabled]="isSubmitting"
        >
          Enviar
        </button>
      </div>
    </form>
  </article>

  <app-deposit-confirmation-modal
    [visible]="exibirModalConfirmacao"
    [formattedAmount]="valorSaqueFormatado"
    [isBusy]="isSubmitting"
    [title]="'Confirmar saque'"
    [description]="'Confira o valor abaixo antes de concluir a operação.'"
    [question]="'Tem certeza que deseja sacar'"
    [amountLabel]="'Valor do saque'"
    [confirmLabel]="'Confirmar'"
    [cancelLabel]="'Cancelar'"
    (cancelled)="fecharModalConfirmacao()"
    (confirmed)="confirmarSaque()"
  />
</section>

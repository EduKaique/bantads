<main class="saque-wrapper">
  <section class="saque-card">

    <div class="saque-header">
      <h1 class="saque-titulo">Saque</h1>
      <p class="saque-subtitulo">Preencha o valor que deseja sacar da sua conta.</p>
    </div>

    <form [formGroup]="saqueForm" class="saque-form">

      <div class="saque-campos">

        <div class="campo-wrapper">
          <span class="campo-label">*Valor</span>
          <input
            class="campo-input"
            type="text"
            placeholder="R$ 0,00"
            formControlName="valor"
            [class.campo-erro]="erroValor"
          />
          @if (erroValor) {
            <span class="mensagem-erro">{{ erroValor }}</span>
          }
        </div>

        <div class="campo-wrapper">
          <span class="campo-label">Disponível</span>
          <div class="campo-input campo-readonly">{{ saldoFormatado }}</div>
        </div>

      </div>

      <p class="campo-obrigatorio">* Campo de preenchimento obrigatório</p>

      <div class="saque-acoes">
        <button class="btn-enviar" type="button" (click)="onEnviar()">
          Sacar
        </button>
      </div>

    </form>
  </section>
</main>

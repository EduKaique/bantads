<div class="modal-backdrop" (click)="emitirFechamento()">
  <div class="modal-container" (click)="$event.stopPropagation()">

    <header class="modal-header">
      <h2 class="heading_3">Alteração de Gerente</h2>
      <p class="body_medium">
        Preecha os campos com as informações atualizadas
      </p>
    </header>

    <form
      class="modal-body"
      [formGroup]="formulario"
      (ngSubmit)="emitirSalvamento()"
    >
      <div class="form-group">
        <label class="label_small">Nome</label>
        <input
          type="text"
          formControlName="nome"
          class="form-input"
          placeholder="nome preenchido"
          (input)="removerNumerosDoNome($event)"
        />
      </div>

      <div class="form-group">
        <label class="label_small">E-mail</label>
        <input
          type="email"
          formControlName="email"
          class="form-input"
          placeholder="exemplo@email.com"
        />
      </div>

      <div class="form-group">
        <label class="label_small">Senha</label>
        <input
          type="password"
          formControlName="senha"
          class="form-input"
          placeholder="••••••••"
        />
      </div>
    </form>

    <footer class="modal-footer">
      <button
        type="button"
        class="button-secondary"
        (click)="emitirFechamento()"
      >
        Voltar
      </button>

      <button
        type="button"
        class="button-primary"
        (click)="emitirSalvamento()"
        [disabled]="formulario.pristine || formulario.invalid"
      >
        Atualizar
      </button>
    </footer>

  </div>
</div>

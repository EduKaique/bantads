<div class="modal-backdrop" (click)="emitirFechamento()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <header class="modal-header">
      <h2 class="heading_3">Novo Gerente</h2>
      <p class="body_medium">Insira os dados do novo Gerente</p>
    </header>

    <form class="modal-body" [formGroup]="formulario" (ngSubmit)="emitirSalvamento()">
      <div class="form-group">
        <label class="label_small">Nome</label>
        <input type="text" formControlName="nome" class="form-input" placeholder="nome preenchido">
      </div>
      <div class="form-group">
        <label class="label_small">CPF</label> <app-input-primary 
        formControlName="cpf" inputName="cpf-novo-gerente" placeholder="000.000.000-00" mask="000.000.000-00"
        ></app-input-primary>
      </div>
      <div class="form-group">
        <label class="label_small">E-mail</label>
        <input type="email" formControlName="email" class="form-input" placeholder="exemplo@email.com">
      </div>
      <div class="form-group">
        <label class="label_small">Telefone</label> <app-input-primary 
        formControlName="telefone" inputName="telefone-novo-gerente" placeholder="(00) 00000-0000" mask="(00) 00000-0000"
        ></app-input-primary>
      </div>
      <div class="form-group">
        <label class="label_small">Senha</label>
        <input type="password" formControlName="senha" class="form-input" placeholder="••••••••">
      </div>
    </form>

    <footer class="modal-footer">
      <button type="button" class="button-secondary" (click)="emitirFechamento()">Voltar</button>
      <button type="button" class="button-primary" (click)="emitirSalvamento()" [disabled]="formulario.invalid">
        Cadastrar &rarr;
      </button>
    </footer>
  </div>
</div>

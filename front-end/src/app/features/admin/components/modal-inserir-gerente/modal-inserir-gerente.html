<div class="modal-backdrop" (click)="emitirFechamento()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <header class="modal-header">
      <h2 class="heading_3">Novo Gerente</h2>
      <p class="body_medium">Insira os dados do novo Gerente</p>
    </header>

    <form class="modal-body" [formGroup]="formulario" (ngSubmit)="emitirSalvamento()">
      <app-input-primary
        formControlName="nome"
        label="Nome"
        placeholder="Nome completo"
        errorMessage="Nome é obrigatório"
        (input)="removerNumerosDoNome($event)">
      </app-input-primary>

      <app-input-primary
        formControlName="cpf"
        label="CPF"
        inputName="cpf-novo-gerente"
        placeholder="000.000.000-00"
        mask="000.000.000-00"
        errorMessage="CPF é obrigatório">
      </app-input-primary>

      <app-input-primary
        formControlName="email"
        label="E-mail"
        type="email"
        placeholder="exemplo@email.com"
        errorMessage="E-mail inválido">
      </app-input-primary>

      <app-input-primary
        formControlName="celular"
        label="Telefone"
        inputName="telefone-novo-gerente"
        placeholder="(00) 00000-0000"
        mask="(00) 00000-0000"
        errorMessage="Telefone é obrigatório">
      </app-input-primary>

      <app-input-primary
        formControlName="senha"
        label="Senha"
        type="password"
        placeholder="••••••••"
        errorMessage="Mínimo de 6 caracteres">
      </app-input-primary>
    </form>

    <footer class="modal-footer">
      <button type="button" class="button-secondary" (click)="emitirFechamento()">Voltar</button>
      <button type="button" class="button-primary" (click)="emitirSalvamento()" [disabled]="formulario.invalid">
        Cadastrar &rarr;
      </button>
    </footer>
  </div>
</div>

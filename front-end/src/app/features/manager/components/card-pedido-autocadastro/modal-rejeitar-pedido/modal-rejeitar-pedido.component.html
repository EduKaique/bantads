<div class="modal-backdrop" (click)="emitirFechamento()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    
    <header class="modal-header">
      <h2 class="modal-titulo">Rejeitar Autocadastro</h2>
      <button type="button" class="btn-fechar" (click)="emitirFechamento()">&times;</button>
    </header>

    <div class="modal-body">
      <p class="modal-descricao">
        Informe o motivo da rejeição para <strong>{{ pedido.nome }}</strong>. Isso será enviado por e-mail ao cliente.
      </p>

      <div class="form-group">
        <textarea 
          class="form-textarea"
          [formControl]="motivoControl" 
          rows="4" 
          placeholder="Digite o motivo detalhado aqui... (mínimo de 10 caracteres)">
        </textarea>
        
        @if (motivoControl.invalid && motivoControl.touched) {
          <span class="erro-mensagem">O motivo é obrigatório e deve ter no mínimo 10 caracteres.</span>
        }
      </div>
    </div>

    <footer class="modal-footer">
      <button type="button" class="btn btn-cancelar" (click)="emitirFechamento()">
        Cancelar
      </button>
      <button 
        type="button" 
        class="btn btn-confirmar" 
        (click)="emitirConfirmacao()" 
        [disabled]="motivoControl.invalid">
        Confirmar Rejeição
      </button>
    </footer>

  </div>
</div>

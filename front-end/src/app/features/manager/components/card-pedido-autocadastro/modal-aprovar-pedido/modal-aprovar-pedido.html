<div
  class="decision-modal-backdrop"
  role="dialog"
  aria-modal="true"
  aria-labelledby="approve-request-title"
  (click)="emitirFechamento()"
>
  <div class="decision-modal" (click)="$event.stopPropagation()">
    <header class="decision-modal__header">
      <div class="decision-modal__heading">
        <h2 id="approve-request-title" class="decision-modal__title heading_5">
          Aprovar autocadastro
        </h2>
        <p class="decision-modal__description body_medium">
          Confirme a aprovação do pedido de <strong>{{ pedido.nome }}</strong>.
          Um e-mail com a senha de acesso será enviado ao cliente.
        </p>
      </div>

      <button
        type="button"
        class="decision-modal__close"
        aria-label="Fechar modal de aprovação"
        (click)="emitirFechamento()"
      >
        &times;
      </button>
    </header>

    <footer class="decision-modal__actions">
      <button
        type="button"
        class="button-secondary decision-modal__action"
        (click)="emitirFechamento()"
      >
        Cancelar
      </button>

      <button
        type="button"
        class="button-primary decision-modal__action"
        (click)="emitirConfirmacao()"
      >
        Confirmar aprovação
      </button>
    </footer>
  </div>
</div>

<header class="header-container">
  <div class="header-content">
    <div class="logo-section" routerLink="/cliente/home">
      <img src="assets/images/logo-white.svg" alt="Bantads Logo" width="150">
    </div>

    <nav class="nav-links">
      <a routerLink="/cliente/home" routerLinkActive="active-link">Home</a>
      <a routerLink="/cliente/deposito" routerLinkActive="active-link">Depósito</a>
      <a routerLink="/cliente/saque" routerLinkActive="active-link">Saque</a>
      <a routerLink="/cliente/transfer" routerLinkActive="active-link">Transferência</a>
      <a routerLink="/cliente/extrato" routerLinkActive="active-link">Extrato</a>
    </nav>

    <div class="profile-section">
      <div class="user-info" (click)="toggleMenu()">
        <span class="user-name label_large">{{ user?.nome }}</span>
        <img src="assets/images/diddy-4k.png" class="avatar" alt="User Avatar">
        <mat-icon [class.rotate]="isMenuOpen()">expand_more</mat-icon>
      </div>

      @if (isMenuOpen()) {
        <div class="profile-dropdown">
          <button (click)="editProfile()">
            <mat-icon>person_edit</mat-icon> Editar Perfil
          </button>
          <button (click)="logout()" class="logout-btn">
            <mat-icon>logout</mat-icon> Sair do sistema
          </button>
        </div>
      }
    </div>
  </div>
</header>

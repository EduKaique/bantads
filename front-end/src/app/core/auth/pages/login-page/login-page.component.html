<main>
  <section class="illustration-section">
    <div>
      <h1 class="display_medium title-login">
        Seu dinheiro, <br />
        no seu controle.
      </h1>
      <p class="body_large description">
        Gerencie suas finanças de forma simples, <br />
        rápida e segura, onde estiver.
      </p>
    </div>
    <div class="container-illustration">
      <img
        src="assets/illustrations/login.svg"
        alt="Ilustração de Login"
        width="500"
      />
    </div>
  </section>
  <section class="form-section">
    <img src="assets/images/logo.svg" alt="Logomarca" width="200" />
    <div class="form-content">
      <div class="form-text">
        <h3 class="heading_3">Login</h3>
        <p class="body_medium">Preencha suas informações para entrar.</p>
      </div>
      <form class="form-inputs" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <app-input-primary
          formControlName="email"
          type="email"
          inputName="email"
          label="Email"
          placeholder="exemple@email.com"
          errorMessage="Por favor, insira um email válido."
          class="input-inherit"
        ></app-input-primary>
        <app-input-primary
          formControlName="password"
          [type]="hide() ? 'password' : 'text'"
          inputName="password"
          label="Senha"
          errorMessage="A senha é obrigatória"
          class="input-inherit"
        >
          <mat-icon
            aria-hidden="false"
            (click)="clickEvent($event)"
            [attr.aria-label]="'Hide password'"
            [attr.aria-pressed]="hide()"
            >{{ hide() ? "visibility_off" : "visibility" }}</mat-icon
          >
        </app-input-primary>
        @if (loginErrorMessage) {
          <div class="error-message body_medium">
            {{ loginErrorMessage }}
          </div>
        }
        <div class="row-btn">
          <button
            class="button-primary label_large btn-login"
            type="submit"
            [disabled]="isLoading || loginForm.invalid"
            [style.opacity]="!isLoading ? '1' : '0.7'"
          >
            @if (!isLoading) {
              Entrar
            } @else {
              Aguarde...
            }
            <mat-icon>arrow_right_alt</mat-icon>
          </button>
        </div>
        <p class="body_medium text-register ">
          Ainda não possui uma conta?
          <a (click)="navigate()" class="label_large">Faça o cadastro.</a>
        </p>
      </form>
    </div>
  </section>
</main>

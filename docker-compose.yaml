services:
  # =========== FRONTEND ===========
  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
      target: dev
    ports:
      - "4200:4200"
    volumes:
      - ./front-end:/app
      - /app/node_modules
    environment:
      - NODE_OPTIONS=--max_old_space_size=4096
    restart: unless-stopped

  # =========== INFRAESTRUTURA BASE =========== 
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"   
      - "15672:15672"
    restart: unless-stopped

  api-gateway:
    build:
      context: ./back-end/api-gateway
      dockerfile: Dockerfile
      target: dev
    ports:
      - "8080:8080" 
    volumes:
      - ./back-end/api-gateway:/app
      - maven-repo:/root/.m2
    restart: unless-stopped

  # =========== BANCOS DE DADOS ===========
  mongodb-auth:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-auth-data:/data/db
    restart: unless-stopped


  postgres-db:
    image: postgres:15
    environment:
      - POSTGRES_USER=springuser
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=bantads_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  # =========== MICROSSERVIÇOS ===========
  ms-auth:
    build:
      context: ./back-end/auth
      dockerfile: Dockerfile
      target: dev
    ports:
      - "8081:8080"
    depends_on:
      - mongodb-auth
    environment:
      - MONGO_URI=mongodb://mongodb-auth:27017/bantads_auth
    volumes:
      - ./ms-auth:/app
      - maven-repo:/root/.m2
    restart: unless-stopped

  ms-cliente:
    build:
      context: ./back-end/cliente
      dockerfile: Dockerfile
      target: dev
    ports:
      - "8082:8080"
    depends_on:
      - postgres-db
      - rabbitmq
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/bantads_db?currentSchema=ms_cliente
      - SPRING_DATASOURCE_USERNAME=springuser
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_RABBITMQ_HOST=rabbitmq
    volumes:
      - ./ms-cliente:/app
      - maven-repo:/root/.m2
    restart: unless-stopped

  ms-gerente:
    build:
      context: ./back-end/gerente
      dockerfile: Dockerfile
      target: dev
    ports:
      - "8083:8080"
    depends_on:
      - postgres-db
      - rabbitmq
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/bantads_db?currentSchema=ms_gerente
      - SPRING_DATASOURCE_USERNAME=springuser
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_RABBITMQ_HOST=rabbitmq
    volumes:
      - ./ms-gerente:/app
      - maven-repo:/root/.m2
    restart: unless-stopped

  conta:
    build:
      context: ./back-end/conta
      dockerfile: Dockerfile
      target: dev
    ports:
      - "8084:8080"
    depends_on:
      - postgres-db
      - rabbitmq
    environment:
      - DB_CUD_URL=jdbc:postgresql://postgres-db:5432/bantads_db
      - DB_READ_URL=jdbc:postgresql://postgres-db:5432/bantads_db
      - DB_USERNAME=springuser
      - DB_PASSWORD=password
      - SPRING_RABBITMQ_HOST=rabbitmq
    volumes:
      - ./back-end/conta:/app
      - maven-repo:/root/.m2
    restart: unless-stopped

# VOLUMES 
volumes:
  maven-repo:
  mongo-auth-data:
  postgres-data:
